name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # The nix flake's moonbit-overlay pre-populates MOON_HOME with a
      # buildCachedRegistry, so `moon update` is not needed (and fails
      # because the baked registry's git remote is a Nix store path,
      # not mooncakes.io). Just validate the toolchain is available.
      - name: MoonBit toolchain check
        run: nix develop --command moon version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        # scripts/build-package.mjs invokes `moon build --target js --release`,
        # which requires moon on PATH — use the devShell.
        run: nix develop --command pnpm run build

      - name: Verify
        # vitest runs inside the devShell so the parquet-fixtures global
        # setup (tests/setup/parquet-fixtures.ts) can invoke `moon test`
        # to populate /tmp/flaker-*.parquet. Without moon on PATH the
        # setup silently skips and tests/parquet/duckdb-interop.test.ts
        # fails.
        run: |
          pnpm run typecheck
          nix develop --command pnpm vitest run
          nix develop --command moon test --target js

      - name: CLI smoke
        run: node dist/cli/main.js --help >/dev/null

      - name: Pack dry-run
        run: pnpm run pack:check

      - name: Publish to npm (OIDC Trusted Publishing)
        run: npm publish --access public --provenance
