name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history needed so git-diff-tree / collect-commit-changes
          # tests find a parent commit.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: MoonBit deps
        run: |
          moon update
          # Populate _build/js/debug/.../flaker.js so tests that import the
          # moonbit bridge via build-artifact.ts's REPO_BRIDGE_CANDIDATES
          # succeed before `pnpm run build` has emitted dist/moonbit/flaker.js.
          moon build --target js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        # Build before Verify so dist/cli/main.js exists for
        # tests/package/cold-start.test.ts and friends.
        run: pnpm run build

      - name: Verify
        run: |
          pnpm run typecheck
          pnpm vitest run
          moon test --target js

      - name: CLI smoke
        run: node dist/cli/main.js --help >/dev/null

      - name: Pack dry-run
        run: pnpm run pack:check

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
