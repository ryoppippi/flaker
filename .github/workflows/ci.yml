name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: MoonBit deps
        run: moon update

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: CLI smoke
        run: node dist/cli/main.js --help >/dev/null

      - name: Test
        run: >
          pnpm exec vitest run
          tests/adapters/playwright.test.ts
          tests/reporting/*.test.ts
          tests/commands/collect.test.ts
          tests/storage/duckdb.test.ts

      - name: Install DuckDB C library
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.4.0/libduckdb-linux-amd64.zip
          unzip -q libduckdb-linux-amd64.zip -d /tmp/duckdb
          sudo cp /tmp/duckdb/duckdb.h /usr/local/include/
          sudo cp /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - name: Native CLI build
        run: |
          C_INCLUDE_PATH=/usr/local/include LIBRARY_PATH=/usr/local/lib \
          moon build --target native src/cmd/flaker_native 2>/dev/null || true
          # Manual link (moon doesn't pass cc-link-flags for deps)
          cc -O2 -o dist/flaker \
            -I"$HOME/.moon/include" \
            "$HOME/.moon/lib/libmoonbitrun.o" \
            _build/native/debug/build/cmd/flaker_native/flaker_native.c \
            _build/native/debug/build/cmd/flaker_native/shell_native.o \
            _build/native/debug/build/runtime.o \
            _build/native/debug/build/.mooncakes/f4ah6o/duckdb/libduckdb.a \
            _build/native/debug/build/.mooncakes/moonbitlang/async/internal/*/lib*.a \
            _build/native/debug/build/.mooncakes/moonbitlang/async/os_error/lib*.a \
            _build/native/debug/build/.mooncakes/moonbitlang/async/socket/lib*.a \
            _build/native/debug/build/.mooncakes/moonbitlang/async/tls/lib*.a \
            _build/native/debug/build/.mooncakes/moonbitlang/async/fs/lib*.a \
            _build/native/debug/build/.mooncakes/moonbitlang/x/fs/lib*.a \
            _build/native/debug/build/.mooncakes/mizchi/zlib/lib*.a \
            -L/usr/local/lib -lduckdb -lz -lm \
            "$HOME/.moon/lib/libbacktrace.a" \
            -Wl,-rpath,/usr/local/lib

      - name: Native CLI smoke
        run: |
          LD_LIBRARY_PATH=/usr/local/lib dist/flaker --help
          LD_LIBRARY_PATH=/usr/local/lib dist/flaker calibrate || echo "No data yet (expected)"

      - name: Full test with JSON report
        if: always()
        run: pnpm exec vitest run --reporter=json > vitest-report.json || true

      - name: Upload vitest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report
          path: vitest-report.json
          if-no-files-found: warn

  self-host-advisory:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: MoonBit deps
        run: moon update

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Prepare artifacts dir
        run: mkdir -p .artifacts

      - name: Collect CI history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node dist/cli/main.js collect --last 30 --output .artifacts/collect.txt

      - name: Download historical self-host metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: >
          node scripts/download-self-host-metrics.mjs
          --out .artifacts/self-host-metrics
          --days 30

      - name: Import historical self-host metrics
        run: node dist/cli/main.js import-parquet .artifacts/self-host-metrics

      - name: Reset self-host parquet export dir
        run: |
          rm -rf .flaker/artifacts
          mkdir -p .flaker/artifacts

      - name: Run flaker PR advisory
        id: flaker_run
        shell: bash
        run: |
          set +e
          node dist/cli/main.js run --profile ci > .artifacts/run.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Download current CI vitest report
        if: always()
        uses: actions/download-artifact@v8
        with:
          name: vitest-report
          path: .self-host/current-ci

      - name: Import current CI vitest report
        if: always()
        run: >
          node dist/cli/main.js import .self-host/current-ci/vitest-report.json
          --adapter vitest
          --commit "${{ github.event.pull_request.head.sha }}"
          --branch "${{ github.head_ref }}"

      - name: Snapshot KPI
        if: always()
        run: node dist/cli/main.js kpi --window-days 30 --json > .artifacts/kpi.json

      - name: Snapshot eval
        if: always()
        run: node dist/cli/main.js eval --json --window 30 --output .artifacts/eval.json > /dev/null

      - name: Render advisory review
        if: always()
        env:
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: >
          node scripts/self-host-review.mjs
          --mode pr
          --kpi .artifacts/kpi.json
          --eval .artifacts/eval.json
          --collect .artifacts/collect.txt
          --run .artifacts/run.txt
          --run-outcome ${{ steps.flaker_run.outputs.result }}
          --workflow-url "${WORKFLOW_URL}"
          --ref-name "${{ github.head_ref }}"
          --sha "${{ github.event.pull_request.head.sha }}"
          --title-out .artifacts/self-host-title.txt
          --body-out .artifacts/self-host-review.md

      - name: Update PR advisory comment
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- flaker-self-host:pr-advisory -->";
            const body = `${marker}\n${fs.readFileSync(".artifacts/self-host-review.md", "utf8")}`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              typeof comment.body === "string" && comment.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Upload advisory artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flaker-self-host-pr-advisory
          path: .artifacts
          if-no-files-found: warn
          include-hidden-files: true

      - name: Upload self-host metrics parquet
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flaker-self-host-metrics
          path: .flaker/artifacts
          if-no-files-found: warn
          include-hidden-files: true
